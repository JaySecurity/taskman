version: "2"
sql:
  - engine: "sqlite"
    queries: "./queries/"
    schema: "./migrations/"
    gen:
      go:
        package: "db"
        out: "../pkg/db/sqlite/"
        emit_pointers_for_null_types: true
        emit_json_tags: true
        overrides:
          - db_type: "datetime"
            nullable: true
            go_type:
              import: "time"
              type: "Time"
